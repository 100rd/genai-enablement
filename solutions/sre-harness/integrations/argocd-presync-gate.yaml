# ArgoCD PreSync advisory change-validation gate (Stage 2 of the SRE harness).
#
# This Job runs as an ArgoCD PreSync hook: ArgoCD creates it BEFORE syncing the
# rest of the application, so the gate evaluates the change ahead of the deploy.
#
# ADVISORY semantics (the point of Stage 2 / autonomy tier T2): the command ends
# with `|| true` and the hook is marked for deletion on success, so a non-zero
# verdict is RECORDED (in the Job logs / ArgoCD UI) but does NOT abort the sync.
# A controller or a human acts on it. Read the verdict with
# `kubectl logs job/sre-harness-change-gate`.
#
# TO MAKE IT BLOCKING (later, once trusted): a failed PreSync hook Job aborts the
# sync by default. Remove the `|| true` from the command so the container exits
# non-zero on block/require_human, and ArgoCD will treat the failed hook as a
# failed sync. See integrations/README.md.
#
# Exit codes from `sre-harness gate`: 0=proceed, 1=block, 2=require_human.
#
# HARDENING. Pod/container run as a fixed non-root UID with a read-only root
# filesystem, no privilege escalation, all Linux capabilities dropped, and the
# default seccomp profile. `pip install` therefore needs somewhere writable
# that isn't the rootfs: an `emptyDir` mounted at `/tmp` holds both the pip
# cache and the installed package (via `pip install --target`), and the
# command runs the module (`python -m sre_harness.cli`) instead of the
# `sre-harness` console script so it works without relying on a script
# wrapper landing on `PATH`. The image tag and the installed `sre-harness`
# version are both pinned (not floating) so the code that runs on every sync
# is reproducible and reviewable — bump both deliberately together. For
# maximum supply-chain assurance, pin the image by digest too (e.g.
# `python:3.11.9-slim-bookworm@sha256:<digest>`), resolved at apply-time
# against the registry — omitted here since it can't be hardcoded generically.
apiVersion: batch/v1
kind: Job
metadata:
  name: sre-harness-change-gate
  annotations:
    argocd.argoproj.io/hook: PreSync
    # Advisory: clean up the hook Job after it runs; combined with `|| true`
    # below this never aborts the sync. Make the gate blocking by removing the
    # `|| true` (see header).
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    metadata:
      name: sre-harness-change-gate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gate
          image: python:3.11.9-slim-bookworm
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              export HOME=/tmp
              export PIP_CACHE_DIR=/tmp/pip-cache
              export PYTHONPATH=/tmp/pip-packages
              pip install --quiet --target /tmp/pip-packages "sre-harness==0.1.0"
              echo "Running advisory change-validation gate (PreSync)..."
              # `--change-format k8s` parses the rendered manifest mounted below;
              # the graph fixture is mounted from a ConfigMap. In production the
              # graph should come from the live OmniscienceMcpPlatformGraph
              # adapter (see the live-adapter TODO in integrations/README.md).
              python -m sre_harness.cli gate \
                --change /work/change/manifest.json \
                --change-format k8s \
                --target-cluster "$TARGET_CLUSTER" \
                --graph /work/graph/platform-graph.json || true
              # `|| true` keeps this advisory. Remove it to make the gate blocking.
          env:
            - name: TARGET_CLUSTER
              value: "prod-eu-1"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: change
              mountPath: /work/change
            - name: graph
              mountPath: /work/graph
            # Writable scratch space: pip cache + install target, since the
            # root filesystem is read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        # The manifest to validate (e.g. rendered StatefulSet) as JSON.
        - name: change
          configMap:
            name: sre-harness-change
        # The platform-graph fixture as JSON.
        - name: graph
          configMap:
            name: sre-harness-graph
        - name: tmp
          emptyDir: {}
