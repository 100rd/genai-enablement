# Advisory change-validation gate for GitLab CI (Stage 2 of the SRE harness).
#
# This snippet adds a `change-validation` stage that runs the deterministic
# `sre-harness gate-integration` over one closed SPEC-B2 envelope and surfaces a verdict
# (proceed / block / require_human) BEFORE the deploy stage.
#
# It is ADVISORY by default: `allow_failure: true` means a `block` (exit 10) or
# `require_human` (exit 20) verdict shows a warning on the pipeline but does NOT
# stop the deploy. This matches the plan's Stage 2 ("Low risk — advisory"): a
# controller or a human acts on the verdict (autonomy tier T2). See
# `integrations/README.md`.
#
# TO MAKE IT BLOCKING (later, once trusted): delete the `allow_failure: true`
# line. The job's exit code then fails the pipeline on `block`/`require_human`.
#
# How to include from your project's .gitlab-ci.yml:
#   include:
#     - local: solutions/sre-harness/integrations/gitlab-ci.gate.yml
# and add `change-validation` to your `stages:` list before `deploy`.
#
# HARDENING NOTE. `image:` is pinned to a specific patch tag (not the
# floating `:3.11-slim`) so the code that runs is reproducible — bump it
# deliberately alongside dependency updates. Unlike the two Kubernetes-Job
# integrations (argocd-presync-gate.yaml, sentinel-cronjob.yaml), there is no
# `securityContext:`/`resources:` equivalent at this level: those are
# runner/executor concerns (e.g. a Kubernetes GitLab Runner's own
# `config.toml`, not this job's YAML) — set them there if your runner is
# Kubernetes-backed. `pip install ./solutions/sre-harness` installs from the
# checked-out repo path, not a resolved PyPI release, so it is already
# pinned to whatever commit this pipeline is running (no separate version
# pin applies, unlike the two files that `pip install` a published package).

stages:
  - change-validation
  - deploy

change-validation:
  stage: change-validation
  image: python:3.11.9-slim-bookworm
  # Advisory: a non-zero verdict warns but does not block the pipeline.
  # Remove the next line to make the gate blocking.
  allow_failure: true
  variables:
    # Portable fixture only. A real consumer must render this closed envelope
    # from the exact MR change and an approved read-only platform snapshot.
    HARNESS_INVOCATION: "solutions/sre-harness/examples/change-advisory-invocation.json"
  before_script:
    - pip install --quiet ./solutions/sre-harness
  script:
    - |
      echo "Running advisory change-validation gate..."
      sre-harness gate-integration \
        --input "$HARNESS_INVOCATION" \
        --result gate-verdict.json
      # Exit codes: 0=proceed, 10=block, 20=require_human, 64=invalid integration.
      # Do not pipe through `tee`: a pipeline would mask the gate's disposition.
  artifacts:
    when: always
    paths:
      - gate-verdict.json
    expire_in: 1 week
  rules:
    # Run on merge requests (where a change is proposed) only.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
